<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CascadingStyle Files Linked To The Project.-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/variables.css">
    <title>Link Shortener</title>
</head>
<body>
    <header>
        <h2>ShortIck</h2>
    </header>

    <main><!--Hero Section -> Title Subtitle Description
    URL Shortener Form -> Label Input Button
    Result Section
    History Section-->
    <section id="hero">
    <h1>Link Shortener</h1>
    <h2>Shorten Your URLs Instantly</h2>
    <p>Create clean. Shareable Links in seconds.</p>
    </section>

    <section id="url-shortener-form">
        <form id="shortener-form">
        <input
            id="url-input"
            type="url"
            required
            placeholder="Paste your long URL here...">
        <button id="shorten-btn">
            Shorten URL
        </button>
        </form>
    </section>

    <section id="result">
        <h2>Generated Link</h2>
        <p>Your shortened URL will appear here.</p>
    </section>

    <section id="history">
        <h2>Recent History</h2>
        <div id="history-list">
            <p>No links yet.</p>
        </div>
    </section>
    
    </main>
    
    <footer>
    © 2026 ShortIck
    </footer>
    
    <!--JavaScript Files Linked To The Project.-->
    <script src="js/validator.js"></script>
    <script src="js/generator.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
</body>
</html>
